# BlazzCore Starship Prompt

format = """
[╭─](bold #4a9eff)$os$username$hostname$directory$git_branch$git_status$python$nodejs$cmd_duration
[╰─](bold #4a9eff)$character"""

[os]
disabled = false
format = "[$symbol](bold #4a9eff) "

[os.symbols]
Arch = " "

[username]
show_always = false
format = "[$user](bold #b0b0b0)[@](dimmed #606060)"

[hostname]
ssh_only = true
format = "[$hostname](bold #b0b0b0) "

[directory]
format = "[ $path]($style)[$read_only]($read_only_style) "
style = "bold #4a9eff"
read_only = " "
truncation_length = 5
truncate_to_repo = true

[git_branch]
format = "[ $branch]($style) "
style = "bold #d4ac0d"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold #c0392b"

[cmd_duration]
min_time = 500
format = "[ $duration]($style) "
style = "dimmed #808080"

[python]
format = "[ $virtualenv]($style) "
style = "bold #d4ac0d"
# Only shows when inside a virtual environment
detect_files = []
detect_folders = []
detect_extensions = []

[nodejs]
format = "[ $version]($style) "
style = "bold #27ae60"
detect_files = ["package.json", ".nvmrc"]
detect_folders = ["node_modules"]

[character]
success_symbol = "[❯](bold #4a9eff)"
error_symbol = "[❯](bold #c0392b)"
