# ============================================
# BlazzCore — Foot Terminal Configuration
# ============================================

[main]
# Font size 11 works well at 1080p — increase to 13-14 for HiDPI (2K/4K displays)
font=monospace:size=11
pad=10x8
notify=notify-send -a ${app-id} ${title} ${body}
# Default window size in characters
initial-window-size-chars=120x34

[colors]
# BlazzCore dark palette
background=0d0d1a
foreground=e0e0f0

# Normal colors
regular0=1a1a2e
regular1=c0392b
regular2=27ae60
regular3=d4ac0d
regular4=5a5aaa
regular5=8e44ad
regular6=1abc9c
regular7=bdbdce

# Bright colors
bright0=2e2e4e
bright1=e74c3c
bright2=2ecc71
bright3=f1c40f
bright4=8080c8
bright5=9b59b6
bright6=1edbbc
bright7=e8e8f0

cursor-color=8080c8
selection-background=2a2a4a
selection-foreground=e0e0f0

[cursor]
style=block
blink=yes
blink-rate=600

[scrollback]
lines=10000

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

[url]
# Ctrl+click or right-click on URLs to open them in the browser
launch=xdg-open ${url}
protocols=http, https, ftp, ftps, file, gemini, irc, ircs, gopher, mailto
