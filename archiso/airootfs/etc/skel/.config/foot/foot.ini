# ============================================
# BlazzCore — Foot Terminal Configuration
# ============================================

[main]
# Font size 11 works well at 1080p — increase to 13-14 for HiDPI (2K/4K displays)
font=monospace:size=11
pad=10x8
notify=notify-send -a ${app-id} ${title} ${body}
# Default window size in characters
initial-window-size-chars=120x34

[colors]
# BlazzCore dark grey palette
background=1e1e1e
foreground=e0e0e0

# Normal colors
regular0=2a2a2a
regular1=c0392b
regular2=27ae60
regular3=d4ac0d
regular4=4a9eff
regular5=8e44ad
regular6=1abc9c
regular7=b0b0b0

# Bright colors
bright0=404040
bright1=e74c3c
bright2=2ecc71
bright3=f1c40f
bright4=6ab4ff
bright5=9b59b6
bright6=1edbbc
bright7=e0e0e0

cursor-color=4a9eff
selection-background=333333
selection-foreground=e0e0e0

[cursor]
style=block
blink=yes
blink-rate=600

[scrollback]
lines=10000

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

[url]
# Ctrl+click or right-click on URLs to open them in the browser
launch=xdg-open ${url}
protocols=http, https, ftp, ftps, file, gemini, irc, ircs, gopher, mailto
