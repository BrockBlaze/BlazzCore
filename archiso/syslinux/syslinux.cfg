DEFAULT blazzcore
PROMPT 1
TIMEOUT 30

LABEL blazzcore
    MENU LABEL BlazzCore Live
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisosearchfilename=/%INSTALL_DIR%/boot/x86_64/vmlinuz-linux cow_spacesize=1G quiet splash

LABEL blazzcore-safe
    MENU LABEL BlazzCore Live (Safe Mode)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisosearchfilename=/%INSTALL_DIR%/boot/x86_64/vmlinuz-linux cow_spacesize=1G nomodeset
