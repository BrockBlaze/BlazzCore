DEFAULT blazzcore
PROMPT 1
TIMEOUT 30

LABEL blazzcore
    MENU LABEL BlazzCore Live
    LINUX /blazzcore/boot/x86_64/vmlinuz-linux
    INITRD /blazzcore/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=blazzcore archisolabel=%ARCHISO_LABEL% quiet splash

LABEL blazzcore-safe
    MENU LABEL BlazzCore Live (Safe Mode)
    LINUX /blazzcore/boot/x86_64/vmlinuz-linux
    INITRD /blazzcore/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=blazzcore archisolabel=%ARCHISO_LABEL% nomodeset
